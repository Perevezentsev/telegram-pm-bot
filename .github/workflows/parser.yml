name: Парсер выставок Эрмитажа

on:
  schedule:
    # Запуск каждый день в 9:00
    - cron: '0 8 * * *'
  workflow_dispatch:  # Запуск вручную из интерфейса GitHub

jobs:
  parse:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4
      
      - name: Run parser
        run: python parser.py
      
      - name: Commit and push database changes
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add exhibitions.db
          git diff --quiet && git diff --staged --quiet || git commit -m "🔄 Автоматическое обновление выставок $(date '+%Y-%m-%d %H:%M:%S')"
          git push