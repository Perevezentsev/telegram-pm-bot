name: Парсер выставок Эрмитажа

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  parse:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 urllib3
      
      - name: Run parser
        run: python parser.py
      
      - name: Commit and push database changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add exhibitions.db
          if git diff --cached --quiet; then
            echo "✅ Нет изменений в базе данных"
          else
            git commit -m "🔄 Автообновление выставок $(date '+%Y-%m-%d %H:%M:%S')"
            git push origin HEAD:${{ github.ref_name }}
            echo "✅ База данных обновлена и запущена"
          fi