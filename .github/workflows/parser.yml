name: Ежедневный парсинг выставок

on:
  schedule:
    # Запуск каждый день в 9:00 UTC (12:00 Москва)
    - cron: '0 9 * * *'
  workflow_dispatch:  # Позволяет запускать вручную из веб-интерфейса

jobs:
  parse:
    runs-on: ubuntu-latest
    
    steps:
    - name: Клонируем репозиторий
      uses: actions/checkout@v3
      
    - name: Устанавливаем Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Устанавливаем зависимости
      run: |
        pip install beautifulsoup4 requests
        
    - name: Запускаем парсер
      run: python parser.py
      
    - name: Коммитим обновленную базу данных
      run: |
        git config user.name "GitHub Actions Bot"
        git config user.email "actions@github.com"
        git add exhibitions.db
        git diff --quiet && git diff --staged --quiet || git commit -m "Автоматическое обновление базы выставок $(date '+%Y-%m-%d')"
        git push